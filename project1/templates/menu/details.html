{% extends "base.html" %}

{% block content %}
<h2>{{ product.name }}</h2>
<img src="{{ product.image.url|default:'https://source.unsplash.com/400x300/?food' }}" alt="{{ product.name }}" width="400">
<p>{{ product.description }}</p>
<p>Price: ${{ product.price }}</p>
<a href="{% url 'orders:cart_add' product.id %}">Add to Cart</a>
{% endblock %}
