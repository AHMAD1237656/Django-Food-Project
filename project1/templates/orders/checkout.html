{% extends "base.html" %}

{% block content %}
<h2>Checkout</h2>
{% if message %}
<p>{{ message }}</p>
{% else %}
<form method="post">
    {% csrf_token %}
    <label>Name:</label><br>
    <input type="text" name="name" required><br>
    <label>Address:</label><br>
    <textarea name="address" required></textarea><br>
    <button type="submit">Place Order</button>
</form>
{% endif %}
{% endblock %}
